context: |
  ## 项目概述
  PorterClaw 是一款跨平台桌面应用，用于系统命令调用和任务管理。

  ## 技术栈
  - 前端框架: Electron + React
  - UI 组件库: Ant Design
  - 状态管理: Zustand
  - 后端通信: Node.js child_process (调用系统命令)
  - 数据库: SQLite3 (better-sqlite3 或 sqlite3 库)
  - 打包工具: electron-builder
  - 开发语言: TypeScript

  ## 代码规范
  - 使用 React Functional Components + Hooks 编写组件
  - 使用 TypeScript 严格模式
  - 组件命名使用 PascalCase
  - 自定义 Hooks 使用 useXxx 命名规范
  - 使用 ES6+ 语法特性

  ## 数据库规范
  - 数据库: SQLite3，使用 better-sqlite3 包
  - 数据库文件位置: app.getPath('userData')/porterclaw.db
  - 使用 Repository 模式封装数据访问层
  - 数据表命名使用小写 + 下划线 (snake_case)
  - 模型类命名使用 PascalCase，单数形式
  - 所有数据库操作必须使用参数化查询，防止 SQL 注入
  - 数据库迁移文件放在 src/main/db/migrations/ 目录
  - 关键操作需要添加事务支持

  ## 项目结构
  - src/main: Electron 主进程代码
  - src/main/db: 数据库相关代码 (连接、迁移、Repository)
  - src/main/db/migrations: 数据库迁移文件
  - src/main/db/repositories: 数据访问层 Repository 类
  - src/renderer: 渲染进程 (React 应用)
  - src/preload: 预加载脚本
  - src/common: 共享类型和工具函数
  - src/common/models: 数据模型类型定义

